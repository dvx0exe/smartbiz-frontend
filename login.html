<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartBiz · Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --emerald:#00c896; --emerald-dim:rgba(0,200,150,.18); --ink:#080d0b;
    --surface:#131e16; --border:rgba(0,200,150,.13);
    --text:#e2ede6; --text-dim:rgba(226,237,230,.4); --red:#f05252;
    --yellow:#f59e0b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--ink);color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:14px;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(0,200,150,.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,200,150,.02) 1px,transparent 1px);
    background-size:48px 48px;
  }
  body::after{
    content:'';position:fixed;width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,200,150,.08) 0%,transparent 70%);
    top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;
  }
  .login-wrap{position:relative;z-index:1;width:100%;max-width:380px;padding:20px;}
  .login-card{
    background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:44px 36px;text-align:center;
    box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(0,200,150,.05);
  }
  .logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:6px;}
  .logo span{color:var(--emerald);}
  .tagline{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:36px;}
  .divider{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .divider span{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;white-space:nowrap;}
  .btn-google{
    display:flex;align-items:center;justify-content:center;gap:12px;
    background:#fff;color:#1f1f1f;text-decoration:none;
    padding:13px 20px;border-radius:4px;font-weight:500;font-size:14px;
    transition:all .2s;border:none;cursor:pointer;width:100%;
  }
  .btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
  .btn-google:active{transform:translateY(0);}
  .google-icon{width:20px;height:20px;flex-shrink:0;}
  .error-banner{
    background:rgba(240,82,82,.12);border:1px solid rgba(240,82,82,.3);
    border-radius:4px;padding:10px 14px;margin-bottom:20px;
    font-size:12px;color:var(--red);display:none;
  }
  .error-banner.show{display:block;}

  .footer-note{margin-top:20px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text-dim);text-align:center;text-transform:uppercase;}
</style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">Smart<span>Biz</span></div>
      <div class="tagline">Gestão Inteligente para negócios</div>

      <div class="error-banner" id="err-banner">
        Ocorreu um erro inesperado. Tente novamente ou entre em contato via WhatsApp.
      </div>

      <div class="divider"><span>Autenticar com</span></div>

      <a id="btn-google" href="#" class="btn-google">
        <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.2 30.1 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.7 13.1 17.9 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8C43.7 37.3 46.5 31.3 46.5 24.5z"/>
          <path fill="#FBBC05" d="M10.8 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.7l8.3-6z"/>
          <path fill="#34A853" d="M24 48c6.1 0 11.2-2 14.9-5.4l-7.5-5.8c-2 1.4-4.6 2.2-7.4 2.2-6.1 0-11.3-3.6-13.2-8.8l-8.3 6C6.9 42.6 14.8 48 24 48z"/>
        </svg>
        Entrar com Google
      </a>
    </div>
    <div class="footer-note">SmartBiz v1.0</div>
  </div>

  <script src="api.js"></script>
  <script>
    // URL do servidor agora é fixa
    var backendUrl = 'https://smartbiz-api.fly.dev';

    function init() {
      document.getElementById('btn-google').href = backendUrl + '/oauth2/authorization/google';
    }

    init();

    var params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'unauthorized') {
      document.getElementById('err-banner').classList.add('show');
    }

    var token = localStorage.getItem('sb_token');
    var role  = localStorage.getItem('sb_role');
    if (token) {
      window.location.href = role === 'ADMIN' ? 'admin-dashboard.html' : 'index.html';
    }
  </script>
</body>
</html>
